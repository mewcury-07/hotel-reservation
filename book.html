<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Now - Vista Hotel</title>
  <style>
   
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #333;
      line-height: 1.6;
    }

    /* Header */
    header {
      background: #0a3d62;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 1px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
      padding-bottom: 4px;
    }
    nav a:hover { color: #d4af37; }
    nav a.active {
      color: #f1c40f;
      font-weight: bold;
      border-bottom: 2px solid #f1c40f;
    }

   
    .booking {
      position: relative;
      background: url("https://static.independent.co.uk/2023/03/24/09/Best%20New%20York%20boutique%20hotels.jpg") no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3rem 1rem;
    }
    .booking::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 31, 68, 0.7);
    }
    .booking-container {
      position: relative;
      max-width: 700px;
      width: 100%;
      background: #fff;
      padding: 2.5rem;
      border-radius: 15px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      z-index: 1;
    }
    .booking-container h2 {
      text-align: center;
      font-size: 2rem;
      color: #0a1f44;
      margin-bottom: 0.5rem;
    }
    .booking-container p {
      text-align: center;
      margin-bottom: 2rem;
      color: #555;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label {
      font-weight: 600;
      color: #0a1f44;
    }
    input, select, textarea {
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      transition: border 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #d4af37;
      outline: none;
    }
    button {
      background: #d4af37;
      color: #0a1f44;
      padding: 1rem;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover {
      background: #fff;
      color: #0a1f44;
      border: 2px solid #d4af37;
    }

    
    #price-display {
      font-weight: bold;
      color: #d4af37;
      margin-top: -0.5rem;
      margin-bottom: 1rem;
    }

    
    footer {
      background: #0a3d62;
      color: #fff;
      text-align: center;
      padding: 1rem;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Vista Hotel</h1>
    <nav>
      <ul>
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="room.html">Rooms</a></li>
        <li><a href="book.html">Book</a></li>
        <li><a href="reward.html">Rewards</a></li>
        <li><a href="review.html">Reviews</a></li>
      </ul>
    </nav>
  </header>

  <!-- Booking Section -->
  <section class="booking">
    <div class="booking-container">
      <h2>Book Your Stay</h2>
      <p>Reserve your room without creating an account.</p>
      
      <form action="#" method="post">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="checkin">Check-in Date:</label>
        <input type="date" id="checkin" name="checkin" required>

        <label for="checkout">Check-out Date:</label>
        <input type="date" id="checkout" name="checkout" required>

        <label for="room">Select Room Type:</label>
        <select id="room" name="room">
          <option value="standard">Standard Room - ₱3,000/night</option>
          <option value="deluxe">Deluxe Room - ₱5,000/night</option>
          <option value="suite">Suite Room - ₱8,000/night</option>
          <option value="budget">Budget Cozy Room - ₱3,000/night</option>
          <option value="classic">Classic Budget Room - ₱3,000/night</option>
          <option value="minimal">Minimal Room - ₱3,000/night</option>
          <option value="deluxecity">Deluxe City View - ₱5,000/night</option>
          <option value="modern">Modern Deluxe - ₱5,000/night</option>
          <option value="elegant">Elegant Deluxe - ₱5,000/night</option>
          <option value="royal">Royal Suite - ₱8,000/night</option>
          <option value="executive">Executive Suite - ₱8,000/night</option>
          <option value="presidential">Presidential Suite - ₱8,000/night</option>
        </select>

        <div id="price-display">Price: ₱3,000/night</div>

        <label for="guests">Number of Guests:</label>
<input type="number" id="guests" name="guests" min="1" max="10" required>

<div id="room-suggestion" style="font-weight:bold; color:#0a3d62; margin-top:5px;">
  Room Suggestion: -
</div>

<div id="total-price" style="font-weight:bold; color:#0a3d62; margin-top:5px;">
  Total Price: ₱0
</div>
        <label for="message">Special Requests (Optional):</label>
        <textarea id="message" name="message" rows="4"></textarea>

        <button type="submit">Confirm Booking</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Vista Hotel. All rights reserved.</p>
  </footer>

  <script>
window.onload = function() {

  const params = new URLSearchParams(window.location.search);
  const roomType = params.get("room");

  const roomSelect = document.getElementById("room");
  const priceDisplay = document.getElementById("price-display");
  const totalDisplay = document.getElementById("total-price");
  const suggestionDisplay = document.getElementById("room-suggestion");

  const checkin = document.getElementById("checkin");
  const checkout = document.getElementById("checkout");
  const guests = document.getElementById("guests");

  function getPriceNumber(text) {
    return parseInt(text.replace(/[^\d]/g, ""));
  }

  function getCapacity(value) {
    if (value.includes("standard") || value.includes("budget") || value.includes("classic") || value.includes("minimal")) return 2;
    if (value.includes("deluxe") || value.includes("deluxecity") || value.includes("modern") || value.includes("elegant")) return 3;
    if (value.includes("suite") || value.includes("royal") || value.includes("executive") || value.includes("presidential")) return 4;
    return 2;
  }

  function updateAll() {
    const selected = roomSelect.options[roomSelect.selectedIndex];

    const basePrice = getPriceNumber(selected.text);

    priceDisplay.textContent = "Price: " + selected.text.match(/₱[\d,]+\/night/)[0];

    const inDate = new Date(checkin.value);
    const outDate = new Date(checkout.value);

    const guestCount = parseInt(guests.value || 1);

    // nights calculation
    if (!checkin.value || !checkout.value || outDate <= inDate) {
      totalDisplay.textContent = "Total Price: ₱0";
      suggestionDisplay.textContent = "Room Suggestion: -";
      return;
    }

    const nights = (outDate - inDate) / (1000 * 60 * 60 * 24);

  
    const guestMultiplier = guestCount > 2 ? 1 + (guestCount - 2) * 0.2 : 1;
    const total = nights * basePrice * guestMultiplier;

    totalDisplay.textContent =
      "Total Price: ₱" + Math.round(total).toLocaleString();

    // ROOM SUGGESTION LOGIC
    const capacity = getCapacity(selected.value);
    const roomsNeeded = Math.ceil(guestCount / capacity);

    if (roomsNeeded === 1) {
      suggestionDisplay.textContent = "Room Suggestion: You only need 1 room";
    } else {
      suggestionDisplay.textContent =
        "Room Suggestion: You need " + roomsNeeded + " rooms";
    }
  }

  // auto select from URL
  if (roomType) {
    for (let option of roomSelect.options) {
      if (option.value === roomType.toLowerCase()) {
        option.selected = true;
        break;
      }
    }
  }

  updateAll();

  roomSelect.addEventListener("change", updateAll);
  checkin.addEventListener("change", updateAll);
  checkout.addEventListener("change", updateAll);
  guests.addEventListener("input", updateAll);

};
</script>

  
  <script src="active-nav.js"></script>
</body>
</html>
